name: Windows Release (Tag)

on:
  push:
    tags:
      - 'v*'   # Se ejecuta cuando haces git tag v1.0.0

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write   # Necesario para crear el release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'   # Ajusta a tu versión

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Zip Build
        run: |
          Compress-Archive `
          -Path build/windows/x64/runner/Release/* `
          -DestinationPath app-windows-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: app-windows-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}